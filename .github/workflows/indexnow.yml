name: IndexNow URL Submission

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'
  workflow_dispatch:
    inputs:
      submit_all:
        description: 'Submit all URLs (not just changed)'
        required: false
        default: 'false'
        type: boolean

jobs:
  submit-to-indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to detect changes

      - name: Detect changed posts
        id: detect
        if: github.event_name == 'push'
        run: |
          # Find changed/added post files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- '_posts/*.md' 2>/dev/null || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No post changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Convert filenames to URLs
          URLS=""
          while IFS= read -r file; do
            if [ -z "$file" ]; then continue; fi
            # Extract date and slug from filename: _posts/YYYY-MM-DD-N-slug.md
            basename=$(basename "$file" .md)
            date_part=$(echo "$basename" | grep -oP '^\d{4}-\d{2}-\d{2}')
            slug=$(echo "$basename" | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')

            if [ -n "$date_part" ] && [ -n "$slug" ]; then
              year=$(echo "$date_part" | cut -d- -f1)
              month=$(echo "$date_part" | cut -d- -f2)
              day=$(echo "$date_part" | cut -d- -f3)
              url="https://ai-media.co.jp/${year}/${month}/${day}/${slug}/"
              URLS="${URLS}${url}\n"
              echo "Post URL: $url"
            fi
          done <<< "$CHANGED_FILES"

          # Save URLs for next step
          echo -e "$URLS" | grep -v '^$' > /tmp/changed_urls.txt || true
          echo "url_count=$(wc -l < /tmp/changed_urls.txt)" >> "$GITHUB_OUTPUT"

      - name: Submit changed URLs to IndexNow
        if: steps.detect.outputs.has_changes == 'true' && github.event_name == 'push'
        run: |
          KEY="d4a47aeefbc75a9805b8a753ad40b917"
          HOST="ai-media.co.jp"
          KEY_LOCATION="https://ai-media.co.jp/${KEY}.txt"

          # Read URLs
          URLS_JSON=$(cat /tmp/changed_urls.txt | jq -R -s 'split("\n") | map(select(length > 0))')
          URL_COUNT=$(echo "$URLS_JSON" | jq 'length')

          if [ "$URL_COUNT" -eq 0 ]; then
            echo "No URLs to submit"
            exit 0
          fi

          echo "Submitting $URL_COUNT URLs to IndexNow..."

          if [ "$URL_COUNT" -eq 1 ]; then
            # Single URL: GET request
            URL=$(echo "$URLS_JSON" | jq -r '.[0]')
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://api.indexnow.org/indexnow?url=${URL}&key=${KEY}&keyLocation=${KEY_LOCATION}")
            echo "Single URL response: $RESPONSE for $URL"
          else
            # Multiple URLs: POST batch
            PAYLOAD=$(jq -n \
              --arg host "$HOST" \
              --arg key "$KEY" \
              --arg keyLocation "$KEY_LOCATION" \
              --argjson urlList "$URLS_JSON" \
              '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

            echo "Payload: $PAYLOAD"

            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$PAYLOAD")
            echo "Batch response: $RESPONSE ($URL_COUNT URLs)"
          fi

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
            echo "IndexNow submission successful"
          else
            echo "IndexNow submission returned: $RESPONSE (may still be accepted)"
          fi

      - name: Submit all URLs to IndexNow
        if: github.event.inputs.submit_all == 'true'
        run: |
          KEY="d4a47aeefbc75a9805b8a753ad40b917"
          HOST="ai-media.co.jp"
          KEY_LOCATION="https://ai-media.co.jp/${KEY}.txt"

          # Build URL list from all posts
          URLS='["https://ai-media.co.jp/"'
          for file in _posts/*.md; do
            basename=$(basename "$file" .md)
            date_part=$(echo "$basename" | grep -oP '^\d{4}-\d{2}-\d{2}')
            slug=$(echo "$basename" | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')

            if [ -n "$date_part" ] && [ -n "$slug" ]; then
              year=$(echo "$date_part" | cut -d- -f1)
              month=$(echo "$date_part" | cut -d- -f2)
              day=$(echo "$date_part" | cut -d- -f3)
              URLS="${URLS},\"https://ai-media.co.jp/${year}/${month}/${day}/${slug}/\""
            fi
          done
          URLS="${URLS}]"

          URL_COUNT=$(echo "$URLS" | jq 'length')
          echo "Submitting all $URL_COUNT URLs to IndexNow..."

          PAYLOAD=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg keyLocation "$KEY_LOCATION" \
            --argjson urlList "$URLS" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          echo "Batch response: $RESPONSE ($URL_COUNT URLs)"

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
            echo "IndexNow submission successful"
          else
            echo "IndexNow submission returned: $RESPONSE"
          fi
